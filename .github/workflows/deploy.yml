name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Validate static export
        run: test -f web-dist/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web-dist
      - name: Build summary
        if: always()
        run: |
          {
            echo "## GitHub Pages Build"
            echo "- artifact path: \`web-dist\`"
            echo "- index.html present: $(test -f web-dist/index.html && echo true || echo false)"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
      - name: Deploy summary
        if: always()
        run: |
          {
            echo "## GitHub Pages Deploy"
            echo "- page url: ${{ steps.deployment.outputs.page_url }}"
            echo "- status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
