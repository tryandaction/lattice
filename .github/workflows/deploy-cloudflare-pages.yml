name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Validate static export
        run: test -f web-dist/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web-dist --project-name lattice --branch main

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "## Cloudflare Pages Deploy"
            echo "- artifact path: \`web-dist\`"
            echo "- target project: \`lattice\`"
            echo "- target url: https://lattice-apq.pages.dev"
            echo "- status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
